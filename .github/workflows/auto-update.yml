name: Actualización automática de datos

on:
  schedule:
    # 12:00 UTC = 06:00 CDMX y 23:00 UTC = 17:00 CDMX (patrón FIAT: 2 corridas/día)
    - cron: '0 12 * * *'
    - cron: '0 23 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: |
          pip install requests pillow playwright
          playwright install chromium --with-deps

      - name: Ejecutar scraper
        run: python scraper/auto_update.py

      - name: Commit y push si hay cambios
        run: |
          git config user.name "scope-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/comisiones.json data/fotos_legisladores.json data/datosgob.json data/perfil-estados.json data/noticias-estatales.json
          if git diff --cached --quiet; then
            echo "Sin cambios"
          else
            git commit -m "auto: datos actualizados $(TZ=America/Mexico_City date +'%Y-%m-%d %H:%M CDMX')"
            git push
          fi
