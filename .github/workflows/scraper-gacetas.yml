name: SCOPE Scraper Legislativo

on:
  schedule:
    - cron: "0 14 * * 1-5"
  workflow_dispatch:

jobs:
  scraper:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install requests beautifulsoup4

      - name: Scraper Federal (Diputados + Senado)
        run: python scraper/scraper_gacetas.py --token dummy --dias 30 --no-upload

      - name: Scraper Estatal (32 congresos)
        run: python scraper/scraper_gacetas_estatales.py --token dummy --no-upload

      - name: Commit y push
        run: |
          git config user.name "SCOPE Bot"
          git config user.email "scope-bot@gemiscopex.github.io"
          git add data/gaceta-federal.json data/gaceta-estatal.json
          if git diff --staged --quiet; then
            echo "Sin cambios nuevos"
          else
            git commit -m "Auto: Gacetas SCOPE $(date +%Y-%m-%d)"
            git pull --rebase origin main
            git push
          fi
