name: SCOPE - Scraper Legislativo Diario

on:
  schedule:
    # 8:00 AM hora Mexico (CDMX = UTC-6  =>  14:00 UTC)
    - cron: "0 14 * * 1-5"
    # 12:00 PM hora Mexico (CDMX = UTC-6  =>  18:00 UTC)
    - cron: "0 18 * * 1-5"
    # 2:30 PM hora Mexico (CDMX = UTC-6  =>  20:30 UTC)
    - cron: "30 20 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias Python
        run: pip install requests beautifulsoup4 lxml

      # ── Scrapers de contenido ─────────────────────────────────────────────

      - name: Scraper Noticias (Google News RSS)
        run: python scraper/scraper.py

      - name: Scraper DOF (Diario Oficial de la Federacion)
        run: python scraper/scraper_dof.py

      - name: Scraper Federal (Gaceta Parlamentaria)
        run: python scraper/scraper_gacetas.py

      - name: Scraper Presidencia (Sheinbaum)
        run: python scraper/scraper_presidencia.py

      # ── Commit y push ─────────────────────────────────────────────────────

      - name: Commit y push del JSON actualizado
        run: |
          git config user.name "SCOPE Bot"
          git config user.email "scope-bot@igemiac.com"
          git add data/noticias.json data/dof.json data/gaceta-federal.json data/gaceta-estatal.json data/presidencia.json
          if git diff --staged --quiet; then
            echo "Sin cambios nuevos"
          else
            git commit -m "Auto: SCOPE $(date +'%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin main
            git push
          fi
