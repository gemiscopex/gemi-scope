name: SCOPE - Scraper Legislativo Diario

on:
  schedule:
    # Corre todos los dias a las 8:00 AM hora Mexico (UTC-6 = 14:00 UTC)
    # Lunes a viernes
    - cron: "0 14 * * 1-5"
  workflow_dispatch:
    # Tambien se puede correr manualmente desde GitHub Actions

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias Python
        run: pip install requests beautifulsoup4 playwright

      - name: Instalar Playwright Chromium
        run: playwright install --with-deps chromium

      - name: Scraper Federal
        run: python scraper/scraper_gacetas.py --token dummy --dias 30 --no-upload

      - name: Scraper Estatal (32 estados)
        run: python scraper/scraper_gacetas_estatales.py --token dummy --no-upload

      - name: Commit y push del JSON actualizado
        run: |
          git config user.name "SCOPE Bot"
          git config user.email "scope-bot@igemiac.com"
          git add data/gaceta-federal.json data/gaceta-estatal.json
          if git diff --staged --quiet; then
            echo "Sin cambios nuevos"
          else
            git commit -m "Auto: Gacetas SCOPE $(date +'%Y-%m-%d')"
            git pull --rebase origin main
            git push
          fi
