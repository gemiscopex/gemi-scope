name: SCOPE - Scraper Diario Automatico

on:
  schedule:
    - cron: "0 14 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Scraper de noticias (Google News RSS)
        run: python scraper/scraper.py

      - name: Scraper de gacetas legislativas
        run: python scraper/scraper_gacetas.py --no-upload

      - name: Commit y push
        run: |
          git config user.name "SCOPE Bot"
          git config user.email "scope-bot@igemiac.com"
          git add data/noticias.json data/gaceta-federal.json
          git diff --staged --quiet || git commit -m "Actualiza noticias y gacetas SCOPE $(date +%Y-%m-%d)"
          git push
